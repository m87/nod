name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test-sqlite:
    name: test (sqlite)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test all packages (postgres tests skip without DSN)
        run: go test ./...

  test-postgres:
    name: test (postgres contract)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nod
          POSTGRES_PASSWORD: nod
          POSTGRES_DB: nod_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nod -d nod_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NOD_TEST_POSTGRES_DSN: host=localhost port=5432 user=nod password=nod dbname=nod_test sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test postgres adapter package
        run: go test ./postgres -v
